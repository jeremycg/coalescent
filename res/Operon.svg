  <rect y="125.5" width="71.12" height="3" fill="#120f1c"/>
  <circle cx="3.5"   cy="3.5"   r="1.5" fill="#0d0a16"/>
  <circle cx="67.62" cy="3.5"   r="1.5" fill="#0d0a16"/>
  <circle cx="3.5"   cy="124.5" r="1.5" fill="#0d0a16"/>
